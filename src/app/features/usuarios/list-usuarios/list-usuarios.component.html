<div class="table-container">
  <div class="header">
    <h2>Usuarios</h2>
    <button class="btn" type="button" (click)="cargarUsuarios()" [disabled]="loading">
      {{ loading ? 'Cargando...' : 'Actualizar' }}
    </button>
  </div>

  <p class="state-message" *ngIf="loading">Cargando usuarios...</p>
  <p class="state-message error" *ngIf="error">{{ error }}</p>

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let u of usuarios">
        <td>{{ u.nombre }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.rol }}</td>
      </tr>
      <tr *ngIf="!loading && usuarios.length === 0">
        <td colspan="3">No hay usuarios registrados</td>
      </tr>
    </tbody>
  </table>
</div>
