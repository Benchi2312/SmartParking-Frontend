<div class="layout">
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-brand">
      <div class="brand-icon">SP</div>
      <h2>Smart Parking</h2>
    </div>

    <nav (click)="closeSidebar()">
      <a class="nav-item" routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
      <a class="nav-item" routerLink="/admin/vehiculos" routerLinkActive="active">Vehiculos</a>
      <a class="nav-item" routerLink="/admin/espacios" routerLinkActive="active">Espacios</a>
      <a class="nav-item" routerLink="/admin/usuarios" routerLinkActive="active">Usuarios</a>
      <a class="nav-item nav-logout" (click)="logout()">Cerrar sesion</a>
    </nav>
  </aside>

  <div class="sidebar-overlay" [class.show]="sidebarOpen" (click)="closeSidebar()"></div>

  <main class="content">
    <header class="topbar">
      <button class="hamburger" (click)="toggleSidebar()" aria-label="Toggle sidebar">&#9776;</button>
      <div>
        <h1>{{ pageTitle }}</h1>
        <p class="subtitle">{{ pageSubtitle }}</p>
      </div>

      <div class="user-box">
        <span>{{ userName }}</span>
      </div>
    </header>

    <section class="view">
      <router-outlet></router-outlet>
    </section>

    <app-footer/>
  </main>
</div>
